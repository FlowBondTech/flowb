[build]
  command = "npm install && npm run build && cd ../docs && npm install && npx vitepress build && cp -r .vitepress/dist ../web/dist/docs"
  publish = "dist"

# Short link redirects -> Telegram bot deep links
[[redirects]]
  from = "/f/:code"
  to = "https://t.me/Flow_b_bot?start=f_:code"
  status = 302
  force = true

[[redirects]]
  from = "/g/:code"
  to = "https://t.me/Flow_b_bot?start=g_:code"
  status = 302
  force = true

[[redirects]]
  from = "/gi/:code"
  to = "https://t.me/Flow_b_bot?start=gi_:code"
  status = 302
  force = true

[[redirects]]
  from = "/ref/:code"
  to = "https://t.me/Flow_b_bot?start=ref_:code"
  status = 302
  force = true

# QR check-in links -> Telegram mini app deep link
[[redirects]]
  from = "/c/:code"
  to = "https://t.me/Flow_b_bot?startapp=checkin_:code"
  status = 302
  force = true

# Smart event links -> proxy to Fastify server for UA-based detection
[[redirects]]
  from = "/e/:id"
  to = "https://flowb.fly.dev/e/:id"
  status = 200
  force = true

# Meeting share links
[[redirects]]
  from = "/m/:code"
  to = "/m.html"
  status = 200

# Referral event links -> proxy to Fastify for click tracking
[[redirects]]
  from = "/t/:code"
  to = "https://flowb.fly.dev/api/v1/referrals/e/:code"
  status = 302
  force = true

# Shared results pages
[[redirects]]
  from = "/r/:code"
  to = "/r.html"
  status = 200

# Clean URL routes for static pages
[[redirects]]
  from = "/leaderboard"
  to = "/leaderboard.html"
  status = 200

[[redirects]]
  from = "/flow"
  to = "/flow.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/settings"
  to = "/settings.html"
  status = 200

[[redirects]]
  from = "/feed"
  to = "/feed.html"
  status = 200

[[redirects]]
  from = "/allevents"
  to = "/allevents.html"
  status = 200

[[redirects]]
  from = "/crews"
  to = "/crews.html"
  status = 200

[[redirects]]
  from = "/agents"
  to = "/agents.html"
  status = 200

[[redirects]]
  from = "/biz"
  to = "/biz.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
