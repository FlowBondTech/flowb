<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report - Cu.Flow</title>
  <meta name="description" content="Cu.Flow Code Intelligence Report">
  <meta property="og:title" content="Cu.Flow Report">
  <meta property="og:description" content="Engineering report by Cu.Flow Code Intelligence">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .report-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }
    .report-header {
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .report-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 12px;
    }
    .report-brand svg { width: 18px; height: 18px; }
    .report-title {
      font-size: 1.6rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .report-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .report-meta .sep { color: var(--text-dim); }
    .report-actions {
      display: flex;
      gap: 10px;
      padding: 16px 0 4px;
    }
    .report-actions button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      background: var(--bg-card);
      color: var(--text);
      font-size: 0.85rem;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.15s;
    }
    .report-actions button:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
    }
    .report-actions button svg { width: 16px; height: 16px; }
    .report-body {
      line-height: 1.7;
      color: var(--text);
    }
    .report-body h2 {
      font-size: 1.15rem;
      font-weight: 700;
      margin: 28px 0 12px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .report-body h3 {
      font-size: 1rem;
      font-weight: 600;
      margin: 20px 0 8px;
    }
    .report-body p { margin: 8px 0; }
    .report-body ul, .report-body ol {
      margin: 8px 0;
      padding-left: 24px;
    }
    .report-body li { margin: 4px 0; }
    .report-body code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
      padding: 2px 6px;
      background: var(--bg-surface);
      border-radius: 4px;
    }
    .report-body pre {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      overflow-x: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      line-height: 1.5;
    }
    .report-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      font-size: 0.9rem;
    }
    .report-body th, .report-body td {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    .report-body th {
      font-weight: 600;
      color: var(--text-muted);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .report-body strong { font-weight: 600; }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin: 16px 0;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      text-align: center;
    }
    .stat-card .stat-val {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent-light);
    }
    .stat-card .stat-label {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .report-loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    .report-loading .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent-light);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .report-error {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    .report-error h2 { border: none; font-size: 1.3rem; }
    @media print {
      .report-actions { display: none; }
      .report-wrap { max-width: 100%; padding: 0; }
    }
  </style>
</head>
<body>
  <div class="report-wrap">
    <!-- Loading State -->
    <div id="report-loading" class="report-loading">
      <div class="spinner"></div>
      <p>Loading report...</p>
    </div>

    <!-- Error State -->
    <div id="report-error" class="report-error" style="display:none;">
      <h2>Report not found</h2>
      <p>This report may have been removed or the link is invalid.</p>
      <p style="margin-top:20px;"><a href="/" style="color:var(--accent-light);">Go to FlowB</a></p>
    </div>

    <!-- Report Content -->
    <div id="report-content" style="display:none;">
      <div class="report-header">
        <div class="report-brand">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
          Cu.Flow Code Intelligence
        </div>
        <h1 class="report-title" id="report-title"></h1>
        <div class="report-meta">
          <span id="report-period"></span>
          <span class="sep">|</span>
          <span id="report-date"></span>
          <span class="sep">|</span>
          <span id="report-views"></span>
        </div>
      </div>

      <div class="report-actions">
        <button onclick="shareReport()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
          Share
        </button>
        <button onclick="downloadMarkdown()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          Markdown
        </button>
      </div>

      <div class="report-body" id="report-body"></div>
    </div>
  </div>

  <script>
    const API = 'https://flowb.fly.dev';
    let reportData = null;

    function getReportCode() {
      // Support /report/{code} paths
      const path = window.location.pathname;
      const match = path.match(/\/report\/([a-z0-9]+)/i);
      if (match) return match[1];
      // Fallback to query param
      const params = new URLSearchParams(window.location.search);
      return params.get('code') || params.get('c');
    }

    async function loadReport() {
      const code = getReportCode();
      if (!code) return showError();

      try {
        const res = await fetch(`${API}/api/v1/cuflow/reports/${encodeURIComponent(code)}`);
        if (!res.ok) return showError();

        reportData = await res.json();
        renderReport(reportData);

        // Track view (fire and forget)
        fetch(`${API}/api/v1/cuflow/reports/${encodeURIComponent(code)}/view`, { method: 'POST' }).catch(() => {});
      } catch (e) {
        console.error('Failed to load report:', e);
        showError();
      }
    }

    function renderReport(r) {
      document.getElementById('report-loading').style.display = 'none';
      document.getElementById('report-content').style.display = 'block';

      document.title = r.title + ' - Cu.Flow';
      document.getElementById('report-title').textContent = r.title;
      document.getElementById('report-period').textContent = r.period || '';
      document.getElementById('report-date').textContent = new Date(r.created_at).toLocaleDateString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric'
      });
      document.getElementById('report-views').textContent = (r.view_count || 0) + ' views';

      // Use HTML content if available, fall back to markdown
      if (r.content_html) {
        document.getElementById('report-body').innerHTML = r.content_html;
      } else if (r.content_md) {
        // Basic markdown-to-HTML for fallback
        document.getElementById('report-body').innerHTML = basicMdToHtml(r.content_md);
      }

      // Add stat grid from metadata
      if (r.metadata?.byCategory) {
        const grid = document.createElement('div');
        grid.className = 'stat-grid';
        const cats = r.metadata.byCategory;
        for (const [cat, count] of Object.entries(cats)) {
          const card = document.createElement('div');
          card.className = 'stat-card';
          card.innerHTML = `<div class="stat-val">${count}</div><div class="stat-label">${cat}</div>`;
          grid.appendChild(card);
        }
        const body = document.getElementById('report-body');
        body.insertBefore(grid, body.firstChild);
      }
    }

    function showError() {
      document.getElementById('report-loading').style.display = 'none';
      document.getElementById('report-error').style.display = 'block';
    }

    function basicMdToHtml(md) {
      return md
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`(.+?)`/g, '<code>$1</code>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/^(?!<)(.+)$/gm, '<p>$1</p>')
        .replace(/<p><\/p>/g, '');
    }

    function shareReport() {
      const url = window.location.href;
      if (navigator.share) {
        navigator.share({
          title: reportData?.title || 'Cu.Flow Report',
          url,
        }).catch(() => {});
      } else {
        navigator.clipboard.writeText(url).then(() => {
          const btn = document.querySelector('.report-actions button');
          const orig = btn.innerHTML;
          btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied!';
          setTimeout(() => { btn.innerHTML = orig; }, 2000);
        });
      }
    }

    function downloadMarkdown() {
      if (!reportData?.content_md) return;
      const blob = new Blob([reportData.content_md], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (reportData.title || 'cuflow-report').replace(/[^a-z0-9]+/gi, '-').toLowerCase() + '.md';
      a.click();
      URL.revokeObjectURL(url);
    }

    loadReport();
  </script>
</body>
</html>
