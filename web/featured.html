<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Featured Events -- FlowB</title>
  <meta name="description" content="See the currently featured event, auction status, and history. Boost your event to the top!">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .featured-hero {
      background: linear-gradient(135deg, rgba(245,158,11,0.12), rgba(239,68,68,0.08));
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 24px;
    }
    .featured-badge {
      display: inline-block;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: #fff;
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .featured-admin-badge {
      display: inline-block;
      background: rgba(139,92,246,0.2);
      color: #a78bfa;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 10px;
      margin-left: 8px;
    }
    .featured-url {
      font-size: 16px;
      font-weight: 600;
      color: #e8e8f0;
      word-break: break-all;
      margin: 14px 0 4px;
      cursor: pointer;
    }
    .featured-url:hover { color: #60a5fa; }
    .featured-url-hint { font-size: 12px; color: #6b7280; }
    .featured-stats {
      display: flex;
      gap: 32px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .featured-stat-value {
      font-size: 28px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }
    .featured-stat-label {
      font-size: 11px;
      color: #6b7280;
      margin-top: 2px;
    }
    .auction-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      background: #1a1a2e;
      border: 1px solid #2d2d44;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .auction-item-label { font-size: 12px; color: #6b7280; }
    .auction-item-value { font-size: 15px; font-weight: 600; color: #e8e8f0; margin-top: 2px; }
    .boost-cta {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      margin-bottom: 24px;
      transition: opacity 0.15s;
    }
    .boost-cta:hover { opacity: 0.9; }
    .history-card {
      background: #1a1a2e;
      border: 1px solid #2d2d44;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .history-card:hover { border-color: #f59e0b44; }
    .history-cycle { font-size: 12px; color: #6b7280; }
    .history-url { font-size: 14px; font-weight: 500; color: #e8e8f0; margin-top: 2px; }
    .history-amount { font-size: 14px; font-weight: 600; color: #22c55e; }
    .history-date { font-size: 11px; color: #6b7280; }
    .section-label {
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
    }
    .empty-state-icon { font-size: 36px; margin-bottom: 8px; }
    .empty-state-title { font-size: 16px; font-weight: 600; color: #e8e8f0; margin-bottom: 4px; }
    .empty-state-sub { font-size: 13px; color: #6b7280; }
    .admin-section {
      background: rgba(139,92,246,0.06);
      border: 1px solid rgba(139,92,246,0.2);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
    }
    .admin-toggle {
      background: none;
      border: none;
      color: #6b7280;
      font-size: 12px;
      cursor: pointer;
      padding: 4px 0;
      margin-bottom: 12px;
    }
    .admin-input {
      width: 100%;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #2d2d44;
      background: #0f0f1a;
      color: #e8e8f0;
      font-size: 13px;
      margin-bottom: 8px;
      box-sizing: border-box;
    }
    .admin-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      background: #7c3aed;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .admin-status { font-size: 12px; margin-top: 6px; }
    @media (max-width: 480px) {
      .featured-stats { gap: 20px; }
      .featured-stat-value { font-size: 22px; }
      .auction-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">
        <img class="logo-icon" src="flowb.png" alt="FlowB">
        <span class="logo-text">FlowB</span>
      </a>
      <nav class="header-nav">
        <a href="/" class="header-nav-link">Events</a>
        <a href="/crews" class="header-nav-link">Crews</a>
        <a href="/feed" class="header-nav-link">Feed</a>
        <a href="/flow" class="header-nav-link" id="navMyFlow">Flow</a>
        <div class="nav-more">
          <button class="header-nav-link nav-more-btn" aria-expanded="false" aria-haspopup="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
          </button>
          <div class="nav-more-dropdown">
            <a href="/featured" class="nav-more-item active">Featured</a>
            <a href="/leaderboard" class="nav-more-item">Leaderboard</a>
            <a href="/agents" class="nav-more-item">Agents</a>
            <a href="/about" class="nav-more-item">About</a>
          </div>
        </div>
      </nav>
      <button class="hamburger" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="header-meta">
        <span class="event-badge">Get in the <span class="gradient-text">Flow</span></span>
        <div class="points-badge" id="pointsBadge" title="Your FlowB Points">
          <div class="points-ring-wrap">
            <svg class="points-ring" width="36" height="36" viewBox="0 0 36 36">
              <circle cx="18" cy="18" r="16" fill="none" stroke="currentColor" stroke-width="2.5" class="points-ring-track"/>
              <circle cx="18" cy="18" r="16" fill="none" stroke="currentColor" stroke-width="2.5" class="points-ring-progress" id="pointsRingProgress"
                stroke-linecap="round" stroke-dasharray="100.53" stroke-dashoffset="100.53" transform="rotate(-90 18 18)"/>
            </svg>
            <span class="points-flame">&#x1F525;</span>
          </div>
          <span class="points-count" id="pointsCount">0</span>
          <div class="points-streak hidden" id="pointsStreak">
            <span class="streak-icon" id="streakIcon"></span>
            <span class="streak-count" id="streakCount"></span>
          </div>
          <div class="points-tooltip" id="pointsTooltip">
            <p class="points-tooltip-title" id="tooltipTitle">0 pts</p>
            <div class="points-tooltip-progress" id="tooltipProgress"></div>
            <p class="points-tooltip-streak hidden" id="tooltipStreak"></p>
          </div>
        </div>
        <button class="auth-btn" id="authBtn">Sign In</button>
        <div class="user-menu hidden" id="userMenu">
          <div class="user-avatar" id="userAvatar">?</div>
          <div class="user-dropdown hidden" id="userDropdown">
            <div class="user-dropdown-header" id="userDropdownHeader"></div>
            <button class="user-dropdown-item" id="logoutBtn">Sign Out</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Page Content -->
  <main class="page-content">
    <div class="container">
      <div class="page-header">
        <div class="page-header-text">
          <h1 class="page-title" style="background: linear-gradient(135deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Featured Events</h1>
          <p class="page-subtitle">24-hour auction to feature your event at the top</p>
        </div>
        <div class="page-header-actions">
          <a href="https://t.me/Flow_b_bot/flowb?startapp=featured" target="_blank" class="page-action-btn">
            Open in Telegram
          </a>
        </div>
      </div>

      <!-- Hero -->
      <div class="featured-hero" id="featuredHero">
        <div style="text-align:center;padding:20px 0;color:#6b7280;">Loading...</div>
      </div>

      <!-- Auction Status -->
      <div class="auction-grid" id="auctionStatus" style="display:none"></div>

      <!-- Boost CTA -->
      <a href="https://t.me/Flow_b_bot/flowb?startapp=featured" target="_blank" class="boost-cta">
        Boost Your Event
      </a>

      <!-- Admin -->
      <button class="admin-toggle" id="adminToggle">Admin Controls</button>
      <div class="admin-section" id="adminSection" style="display:none">
        <input class="admin-input" type="password" id="adminKey" placeholder="Admin key">
        <input class="admin-input" type="text" id="adminUrl" placeholder="Event URL to feature (leave empty to clear)">
        <button class="admin-btn" id="adminBtn">Set Override</button>
        <div class="admin-status" id="adminStatusEl"></div>
      </div>

      <!-- History -->
      <div id="historySection" style="display:none">
        <div class="section-label">Past Featured Events</div>
        <div id="historyList"></div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-left">
        <img class="logo-icon small" src="flowb.png" alt="FlowB">
        <span>FlowB</span>
        <span class="footer-dot"></span>
        <span class="footer-muted">Powered by FlowBond Tech</span>
      </div>
      <div class="footer-right">
        <a href="https://t.me/Flow_b_bot" target="_blank" class="footer-link">Telegram Bot</a>
        <a href="https://farcaster.xyz/miniapps/oCHuaUqL5dRT/flowb" target="_blank" class="footer-link">Farcaster MiniApp</a>
        <a href="https://flowb.fly.dev/api/v1/events" target="_blank" class="footer-link">API</a>
      </div>
    </div>
  </footer>

  <div class="points-toasts" id="pointsToasts"></div>
  <div id="privy-root"></div>

  <script src="points.js"></script>
  <script src="auth.js"></script>
  <script>
    const FLOWB_API = 'https://flowb.fly.dev';

    function escapeHtml(s) {
      if (!s) return '';
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function truncateUrl(url, max) {
      max = max || 50;
      if (!url) return '';
      try {
        var u = new URL(url);
        var d = u.hostname + u.pathname;
        return d.length > max ? d.slice(0, max) + '...' : d;
      } catch(e) {
        return url.length > max ? url.slice(0, max) + '...' : url;
      }
    }

    function formatCountdown(secs) {
      if (secs <= 0) return 'Ended';
      var h = Math.floor(secs / 3600);
      var m = Math.floor((secs % 3600) / 60);
      var s = secs % 60;
      return h + 'h ' + m + 'm ' + s + 's';
    }

    function formatDate(iso) {
      try {
        return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
      } catch(e) { return iso; }
    }

    var countdownTimer;
    var countdownSecs = 0;

    async function loadFeatured() {
      try {
        var res = await fetch(FLOWB_API + '/api/v1/featured');
        if (!res.ok) throw new Error('Failed');
        var data = await res.json();
        renderFeatured(data);
      } catch(e) {
        document.getElementById('featuredHero').innerHTML =
          '<div class="empty-state"><div class="empty-state-icon">&#x26A0;&#xFE0F;</div><div class="empty-state-title">Could not load data</div><div class="empty-state-sub">' + escapeHtml(e.message) + '</div></div>';
      }
    }

    function renderFeatured(data) {
      var hero = document.getElementById('featuredHero');
      var auctionEl = document.getElementById('auctionStatus');
      var cur = data.current;

      if (cur && cur.effectiveUrl) {
        var badges = '<span class="featured-badge">Featured Now</span>';
        if (cur.adminOverrideUrl) badges += '<span class="featured-admin-badge">Admin Pick</span>';

        countdownSecs = cur.timeRemainingSeconds || 0;

        hero.innerHTML =
          '<div>' + badges + '</div>' +
          '<div class="featured-url" onclick="window.open(\'' + escapeHtml(cur.effectiveUrl) + '\',\'_blank\')">' + escapeHtml(truncateUrl(cur.effectiveUrl, 60)) + '</div>' +
          '<div class="featured-url-hint">Tap to view event</div>' +
          '<div class="featured-stats">' +
            '<div><div class="featured-stat-value" id="countdownDisplay">' + formatCountdown(countdownSecs) + '</div><div class="featured-stat-label">Time Remaining</div></div>' +
            '<div><div class="featured-stat-value" style="color:#22c55e">$' + (cur.amountUsdc || 0).toFixed(2) + '</div><div class="featured-stat-label">Current Bid</div></div>' +
          '</div>';

        // Start countdown
        clearInterval(countdownTimer);
        countdownTimer = setInterval(function() {
          countdownSecs = Math.max(0, countdownSecs - 1);
          var el = document.getElementById('countdownDisplay');
          if (el) el.textContent = formatCountdown(countdownSecs);
          if (countdownSecs <= 0) clearInterval(countdownTimer);
        }, 1000);

        // Auction status
        auctionEl.style.display = 'grid';
        auctionEl.innerHTML =
          '<div><div class="auction-item-label">Cycle</div><div class="auction-item-value">#' + cur.cycleNumber + '</div></div>' +
          '<div><div class="auction-item-label">Min Next Bid</div><div class="auction-item-value" style="color:#22c55e">$' + (cur.minNextBid || 0.10).toFixed(2) + '</div></div>' +
          '<div><div class="auction-item-label">Payment</div><div class="auction-item-value">USDC (Base) / Stripe</div></div>' +
          '<div><div class="auction-item-label">Ends At</div><div class="auction-item-value">' + formatDate(cur.endsAt) + '</div></div>';

      } else {
        hero.innerHTML =
          '<div class="empty-state">' +
            '<div class="empty-state-icon">&#x1F3AF;</div>' +
            '<div class="empty-state-title">No Featured Event Yet</div>' +
            '<div class="empty-state-sub">Be the first to boost your event to the top!</div>' +
          '</div>';
      }

      // History
      var hist = data.history || [];
      if (hist.length > 0) {
        var section = document.getElementById('historySection');
        var list = document.getElementById('historyList');
        section.style.display = 'block';
        list.innerHTML = hist.map(function(h) {
          return '<div class="history-card"' + (h.eventUrl ? ' onclick="window.open(\'' + escapeHtml(h.eventUrl) + '\',\'_blank\')"' : '') + '>' +
            '<div><span class="history-cycle">Cycle #' + h.cycleNumber + '</span>' +
            '<div class="history-url">' + (h.eventUrl ? escapeHtml(truncateUrl(h.eventUrl, 40)) : 'No winner') + '</div></div>' +
            '<div style="text-align:right"><div class="history-amount">$' + (h.amountUsdc || 0).toFixed(2) + '</div>' +
            '<div class="history-date">' + formatDate(h.endedAt) + '</div></div>' +
          '</div>';
        }).join('');
      }
    }

    // Admin controls
    document.getElementById('adminToggle').addEventListener('click', function() {
      var sec = document.getElementById('adminSection');
      sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
    });

    document.getElementById('adminBtn').addEventListener('click', async function() {
      var key = document.getElementById('adminKey').value;
      var url = document.getElementById('adminUrl').value;
      var statusEl = document.getElementById('adminStatusEl');

      if (!key) { statusEl.textContent = 'Enter admin key'; statusEl.style.color = '#ef4444'; return; }
      statusEl.textContent = 'Saving...'; statusEl.style.color = '#6b7280';

      try {
        var headers = { 'Content-Type': 'application/json', 'x-admin-key': key };
        var token = localStorage.getItem('flowb_token');
        if (token) headers['Authorization'] = 'Bearer ' + token;

        var res = await fetch(FLOWB_API + '/api/v1/admin/featured-event', {
          method: 'POST',
          headers: headers,
          body: JSON.stringify({ eventUrl: url || null }),
        });

        if (!res.ok) {
          var err = await res.json().catch(function() { return { error: res.statusText }; });
          statusEl.textContent = 'Error: ' + (err.error || res.statusText);
          statusEl.style.color = '#ef4444';
          return;
        }

        statusEl.textContent = url ? 'Override set!' : 'Override cleared!';
        statusEl.style.color = '#22c55e';
        document.getElementById('adminUrl').value = '';
        loadFeatured();
      } catch(e) {
        statusEl.textContent = 'Error: ' + e.message;
        statusEl.style.color = '#ef4444';
      }
    });

    // Load on ready
    loadFeatured();

    // Nav more dropdown
    var moreBtn = document.querySelector('.nav-more-btn');
    if (moreBtn) {
      moreBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        var dd = document.querySelector('.nav-more-dropdown');
        var open = dd.classList.toggle('show');
        moreBtn.setAttribute('aria-expanded', open);
      });
      document.addEventListener('click', function() {
        var dd = document.querySelector('.nav-more-dropdown');
        if (dd) { dd.classList.remove('show'); moreBtn.setAttribute('aria-expanded', 'false'); }
      });
    }

    // Hamburger mobile nav
    var toggle = document.getElementById('navToggle');
    if (toggle) {
      toggle.addEventListener('click', function() {
        document.querySelector('.header-nav').classList.toggle('open');
        toggle.classList.toggle('active');
      });
    }
  </script>
</body>
</html>
