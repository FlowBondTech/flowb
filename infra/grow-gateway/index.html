<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grow | koH</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #222;
      --text: #e0e0e0;
      --muted: #666;
      --accent: #4ade80;
      --accent-dim: #22c55e20;
    }
    body {
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .gate {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
    }
    .logo {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }
    .logo span { color: var(--accent); }
    h1 {
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 0.5rem;
    }
    .sub {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      text-decoration: none;
      display: block;
      color: var(--text);
    }
    .card:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .card-desc {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .card-status {
      display: inline-block;
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--accent-dim);
      color: var(--accent);
      margin-top: 0.5rem;
    }
    .gate-form {
      margin-top: 2rem;
      display: none;
    }
    .gate-form.active { display: block; }
    .gate-form input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
    }
    .gate-form input:focus { border-color: var(--accent); }
    .gate-form button {
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.75rem;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .gate-form button:hover { opacity: 0.9; }
    .error { color: #f87171; font-size: 0.8rem; margin-top: 0.5rem; display: none; }
    footer {
      margin-top: 3rem;
      font-size: 0.7rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="gate">
    <div class="logo"><span>grow</span> . koh . lol</div>

    <div id="locked">
      <h1>ops gateway</h1>
      <p class="sub">internal tools — enter access code</p>

      <div class="gate-form active">
        <input type="password" id="code" placeholder="access code" autofocus>
        <button onclick="unlock()">enter</button>
        <p class="error" id="err">invalid code</p>
      </div>
    </div>

    <div id="dashboard" style="display:none">
      <h1>tools</h1>
      <p class="sub">flowb ops dashboard</p>

      <a class="card" href="/postiz/" id="postiz-link">
        <div class="card-title">postiz</div>
        <div class="card-desc">social media scheduler & publisher</div>
        <span class="card-status">running</span>
      </a>

      <a class="card" href="/n8n/" id="n8n-link">
        <div class="card-title">n8n</div>
        <div class="card-desc">workflow automation</div>
        <span class="card-status">running</span>
      </a>

      <a class="card" href="/temporal/" id="temporal-link">
        <div class="card-title">temporal</div>
        <div class="card-desc">workflow engine monitor</div>
        <span class="card-status">running</span>
      </a>

      <footer>ovh vps-2 &middot; 6c/12gb</footer>
    </div>
  </div>

  <script>
    const HASH = '8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918'; // sha256 of 'admin'

    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function unlock() {
      const code = document.getElementById('code').value;
      const hash = await sha256(code);
      if (hash === HASH) {
        sessionStorage.setItem('grow_auth', '1');
        showDashboard();
      } else {
        document.getElementById('err').style.display = 'block';
      }
    }

    function showDashboard() {
      document.getElementById('locked').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('postiz-link').href = 'https://postiz.koh.lol';
      document.getElementById('n8n-link').href = 'https://n8n.koh.lol';
      document.getElementById('temporal-link').href = 'https://temporal.koh.lol';
    }

    document.getElementById('code')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') unlock();
    });

    if (sessionStorage.getItem('grow_auth')) showDashboard();
  </script>
</body>
</html>
