# import "../fragments/user.gql"

query GetMyPendingBondRequests($limit: Int, $offset: Int) {
  myPendingBondRequests(limit: $limit, offset: $offset) {
    id
    requester {
      ...UserBasicInfo
    }
    recipient {
      ...UserBasicInfo
    }
    status
    message
    match_reasons {
      mutual_bonds
      same_events
      music_overlap
      dance_styles
      similarity_score
    }
    created_at
    expires_at
  }
}

