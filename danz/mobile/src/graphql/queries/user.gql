# import "../fragments/user.gql"

query GetMyProfile {
  me {
    ...UserFullInfo
  }
}

query GetUserById($id: String!) {
  user(id: $id) {
    ...UserFullInfo
  }
}

query GetUsers($filter: UserFilterInput, $pagination: PaginationInput) {
  users(filter: $filter, pagination: $pagination) {
    users {
      ...UserBasicInfo
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    totalCount
  }
}

query CheckUsername($username: String!) {
  checkUsername(username: $username)
}

query GetMyDanceBonds {
  myDanceBonds {
    id
    user1_id
    user2_id
    bond_level
    shared_sessions
    created_at
    updated_at
    otherUser {
      ...UserBasicInfo
    }
  }
}