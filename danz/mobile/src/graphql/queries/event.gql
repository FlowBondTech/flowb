query GetEventRegistrations($eventId: ID!, $status: RegistrationStatus) {
  eventRegistrations(eventId: $eventId, status: $status) {
    id
    event_id
    user_id
    status
    registration_date
    payment_status
    payment_amount
    user {
      ...UserBasicInfo
    }
  }
}