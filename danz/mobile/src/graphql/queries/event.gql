# import "../fragments/event.gql"
# import "../fragments/user.gql"

query GetEvents($filter: EventFilterInput, $pagination: PaginationInput, $sortBy: EventSortBy) {
  events(filter: $filter, pagination: $pagination, sortBy: $sortBy) {
    events {
      ...EventFullInfo
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    totalCount
  }
}

query GetEvent($id: ID!) {
  event(id: $id) {
    ...EventWithParticipants
  }
}

query GetEventsNearLocation($latitude: Float!, $longitude: Float!, $radius: Float) {
  events(
    filter: {
      nearLocation: {
        latitude: $latitude
        longitude: $longitude
        radius: $radius
      }
      status: upcoming
    }
  ) {
    events {
      ...EventFullInfo
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    totalCount
  }
}

