<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowMobile Sovereign Quad | Access</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0a0d0a;
  --bg-card: #161b16;
  --text-primary: #e8e6e1;
  --text-secondary: #a8a599;
  --text-muted: #6b6960;
  --text-dim: #4a4840;
  --green-mid: #2d4a2d;
  --green-bright: #4a7c4a;
  --green-accent: #6db86d;
  --amber: #c8a84e;
  --amber-dim: #8a7030;
  --red-alert: #c44040;
  --border-subtle: rgba(74, 124, 74, 0.15);
  --border-medium: rgba(74, 124, 74, 0.25);
  --font-mono: 'Courier New', 'Consolas', 'Liberation Mono', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Liberation Sans', sans-serif;
}

html { font-size: 16px; }

body {
  font-family: var(--font-sans);
  background-color: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    linear-gradient(rgba(74, 124, 74, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(74, 124, 74, 0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 30% 40%, rgba(45, 74, 45, 0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 60%, rgba(200, 168, 78, 0.04) 0%, transparent 50%);
  pointer-events: none;
}

.gate {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 2rem;
  max-width: 420px;
  width: 100%;
}

.gate-classification {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--amber-dim);
  text-transform: uppercase;
  letter-spacing: 0.3em;
  margin-bottom: 2rem;
  padding: 0.25rem 1rem;
  border: 1px solid var(--amber-dim);
  display: inline-block;
}

.gate-title {
  font-family: var(--font-mono);
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}

.gate-title .flow { color: var(--green-accent); }
.gate-title .sovereign { color: var(--amber); }

.gate-subtitle {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 2.5rem;
}

.gate-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  align-items: center;
}

.gate-input-wrapper {
  width: 100%;
  max-width: 300px;
  position: relative;
}

.gate-input {
  width: 100%;
  font-family: var(--font-mono);
  font-size: 0.85rem;
  letter-spacing: 0.08em;
  padding: 0.75rem 1rem;
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  color: var(--text-primary);
  text-align: center;
  outline: none;
  transition: border-color 0.25s ease, box-shadow 0.25s ease;
}

.gate-input::placeholder {
  color: var(--text-dim);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-size: 0.7rem;
}

.gate-input:focus {
  border-color: var(--border-medium);
  box-shadow: 0 0 20px rgba(74, 124, 74, 0.1);
}

.gate-input.error {
  border-color: var(--red-alert);
  box-shadow: 0 0 12px rgba(196, 64, 64, 0.15);
}

.gate-submit {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  padding: 0.5rem 2rem;
  background: var(--green-bright);
  color: var(--bg-primary);
  border: 1px solid var(--green-accent);
  cursor: pointer;
  transition: all 0.3s ease;
}

.gate-submit:hover {
  background: var(--green-accent);
  box-shadow: 0 0 20px rgba(109, 184, 109, 0.25);
}

.gate-error {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--red-alert);
  letter-spacing: 0.06em;
  min-height: 1.2em;
  opacity: 0;
  transition: opacity 0.25s ease;
}

.gate-error.visible {
  opacity: 1;
}

.gate-rule {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  margin-top: 2rem;
}

.gate-rule::before,
.gate-rule::after {
  content: '';
  height: 1px;
  width: 40px;
  background: linear-gradient(90deg, transparent, var(--green-mid), transparent);
}

.gate-rule-diamond {
  width: 5px;
  height: 5px;
  background: var(--amber-dim);
  transform: rotate(45deg);
}
</style>
</head>
<body>

<div class="gate">
  <div class="gate-classification">Private Presentation</div>
  <h1 class="gate-title">
    <span class="flow">FlowMobile</span><br>
    <span class="sovereign">Sovereign Quad</span>
  </h1>
  <p class="gate-subtitle">Authorized Access Required</p>

  <form class="gate-form" id="gateForm">
    <div class="gate-input-wrapper">
      <input
        type="password"
        class="gate-input"
        id="gatePassword"
        placeholder="Enter access code"
        autocomplete="off"
        autofocus
      >
    </div>
    <button type="submit" class="gate-submit">Authenticate</button>
    <div class="gate-error" id="gateError">Invalid access code</div>
  </form>

  <div class="gate-rule">
    <div class="gate-rule-diamond"></div>
  </div>
</div>

<script>
(function() {
  'use strict';

  var form = document.getElementById('gateForm');
  var input = document.getElementById('gatePassword');
  var error = document.getElementById('gateError');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    if (input.value === 'flowbmobile') {
      sessionStorage.setItem('flowmobile_auth', 'true');
      window.location.href = 'index.html';
    } else {
      input.classList.add('error');
      error.classList.add('visible');
      input.value = '';
      input.focus();
      setTimeout(function() {
        input.classList.remove('error');
        error.classList.remove('visible');
      }, 2000);
    }
  });
})();
</script>

</body>
</html>
