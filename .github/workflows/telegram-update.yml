name: Send FlowB Update to Telegram Group

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Custom message to send (HTML format)'
        required: true
        type: string

jobs:
  send-update:
    runs-on: ubuntu-latest
    steps:
      - name: Send update to Telegram group
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }}
          MESSAGE: ${{ inputs.message }}
        run: |-
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="false"
