name: Supabase Migrations CI

on:
  pull_request:
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-*.yml"
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-*.yml"
  workflow_dispatch:

jobs:
  validate-migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase db start

      - name: Validate migration replay
        run: supabase db reset --local --no-seed

      - name: Lint schema
        run: supabase db lint --local
