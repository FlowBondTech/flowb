name: Telegram Push Notify

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send Telegram notification
        shell: bash
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |-
          SHORT_SHA=$(echo "$SHA" | cut -c1-7)
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
          LOWER=$(echo "$FIRST_LINE" | tr '[:upper:]' '[:lower:]')

          ICON="📦"
          if echo "$LOWER" | grep -qE '^(fix|bug)'; then ICON="🐛"; fi
          if echo "$LOWER" | grep -qE '^(feat|add|new)'; then ICON="✨"; fi
          if echo "$LOWER" | grep -qE '^doc'; then ICON="📝"; fi
          if echo "$LOWER" | grep -qE '^refactor'; then ICON="♻️"; fi
          if echo "$LOWER" | grep -qE '^(perf|optim)'; then ICON="⚡"; fi
          if echo "$LOWER" | grep -qE '^test'; then ICON="🧪"; fi
          if echo "$LOWER" | grep -qE '^(style|ui)'; then ICON="🎨"; fi
          if echo "$LOWER" | grep -qE '^(chore|dep)'; then ICON="🔧"; fi
          if echo "$LOWER" | grep -qE '^(deploy|ship)'; then ICON="🚀"; fi
          if echo "$LOWER" | grep -qE '^secur'; then ICON="🔒"; fi
          if echo "$LOWER" | grep -qE '^(improve|update|enhance)'; then ICON="🔼"; fi

          STATS=$(git diff --shortstat HEAD~1 HEAD 2>/dev/null || echo "")
          FILES=$(echo "$STATS" | grep -oP '\d+ file' | grep -oP '\d+' || echo "0")
          ADDS=$(echo "$STATS" | grep -oP '\d+ insertion' | grep -oP '\d+' || echo "0")
          DELS=$(echo "$STATS" | grep -oP '\d+ deletion' | grep -oP '\d+' || echo "0")

          BRANCH_LABEL=""
          if [ "$BRANCH" != "main" ]; then
            BRANCH_LABEL="  ·  <code>${BRANCH}</code>"
          fi

          TEXT="${ICON} <b>${FIRST_LINE}</b>

          <code>${SHORT_SHA}</code>  ·  ${AUTHOR}${BRANCH_LABEL}
          ${FILES} files  ·  <code>+${ADDS}</code>  <code>-${DELS}</code>

          <a href=\"${COMMIT_URL}\">View diff →</a>"

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${TEXT}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true"
