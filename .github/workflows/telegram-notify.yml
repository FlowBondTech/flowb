name: Telegram Push Notify

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }}
        run: |
          COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -1)
          AUTHOR="${{ github.event.head_commit.author.name }}"
          COMMIT_URL="${{ github.event.head_commit.url }}"
          REPO="${{ github.repository }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          # Count files changed
          FILES_CHANGED=${{ github.event.commits[0].added.length + github.event.commits[0].modified.length + github.event.commits[0].removed.length }}

          TEXT="<b>Push to ${REPO}</b>

<code>${SHORT_SHA}</code> ${COMMIT_MSG}
by ${AUTHOR}

<a href=\"${COMMIT_URL}\">View commit</a>"

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${TEXT}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true"
