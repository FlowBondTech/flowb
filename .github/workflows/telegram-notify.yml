name: Telegram Push Notify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA=$(echo "$SHA" | cut -c1-7)
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)

          # Detect commit type for icon
          case "$FIRST_LINE" in
            fix*|Fix*|bug*|Bug*)     ICON="🐛" ;;
            feat*|add*|Add*|new*)    ICON="✨" ;;
            docs*|doc*)              ICON="📝" ;;
            refactor*|Refactor*)     ICON="♻️" ;;
            perf*|Perf*|optim*)      ICON="⚡" ;;
            test*|Test*)             ICON="🧪" ;;
            style*|Style*|ui*|UI*)   ICON="🎨" ;;
            chore*|Chore*|dep*)      ICON="🔧" ;;
            deploy*|Deploy*|ship*)   ICON="🚀" ;;
            security*|Security*)     ICON="🔒" ;;
            *)                       ICON="📦" ;;
          esac

          # Get changed file stats
          STATS=$(git diff --shortstat HEAD~1 HEAD 2>/dev/null || echo "")
          FILES=$(echo "$STATS" | grep -oP '\d+ file' | grep -oP '\d+' || echo "0")
          ADDS=$(echo "$STATS" | grep -oP '\d+ insertion' | grep -oP '\d+' || echo "0")
          DELS=$(echo "$STATS" | grep -oP '\d+ deletion' | grep -oP '\d+' || echo "0")

          TEXT="${ICON} <b>${FIRST_LINE}</b>

<code>${SHORT_SHA}</code>  ·  ${AUTHOR}
${FILES} files  ·  <code>+${ADDS}</code>  <code>-${DELS}</code>

<a href=\"${COMMIT_URL}\">View diff →</a>"

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${TEXT}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true"
